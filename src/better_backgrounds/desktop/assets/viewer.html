<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data:; style-src 'nonce-{{NONCE}}'; script-src qrc: 'nonce-{{NONCE}}'; connect-src 'none'; media-src 'none'; worker-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Scene placeholder</title>
  <style nonce="{{NONCE}}">
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #15161a; }
    body { font-family: system-ui, sans-serif; color: #e7e8ea; }
    .scene { position: absolute; inset: 0; background: radial-gradient(90% 80% at 72% 16%, rgba(255,238,208,.5), transparent 45%), radial-gradient(70% 55% at 20% 92%, rgba(90,110,140,.25), transparent 60%), linear-gradient(160deg,#45423c,#17181b); }
    .vignette { position: absolute; inset: 0; box-shadow: inset 0 0 150px 18px rgba(0,0,0,.5); }
    .subject { position: absolute; left: 50%; top: 56%; translate: -50% -50%; width: 18%; max-width: 150px; height: 48%; border-radius: 18px; background: linear-gradient(150deg,#d9ac86,#9e7355); border: 1px solid rgba(255,220,190,.25); box-shadow: 0 0 46px rgba(255,214,170,.18); }
    .safe { position: absolute; left: 23%; right: 23%; top: 17%; bottom: 14%; border: 1px dashed rgba(224,163,74,.48); border-radius: 50%; }
    .label { position: absolute; top: 14px; left: 14px; padding: 7px 11px; border-radius: 8px; background: rgba(12,13,15,.72); font: 600 11px ui-monospace, monospace; color: #e0a34a; }
    .hint { position: absolute; left: 50%; bottom: 17px; translate: -50%; color: rgba(255,255,255,.58); font-size: 12px; white-space: nowrap; }
  </style>
</head>
<body>
  <main class="scene" aria-label="Placeholder reconstructed room">
    <div class="vignette"></div>
    <div class="safe"></div>
    <div class="subject"></div>
    <div class="label">PREPARED SCENE · PLACEHOLDER</div>
    <div class="hint">PlayCanvas rendering arrives in Phase 3</div>
  </main>
  <script nonce="{{NONCE}}" src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script nonce="{{NONCE}}">
    new QWebChannel(qt.webChannelTransport, function (channel) {
      channel.objects.rendererBridge.renderer_ready();
    });
  </script>
</body>
</html>
