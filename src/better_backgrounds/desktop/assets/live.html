<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data: bbscene:; style-src 'nonce-{{NONCE}}'; script-src qrc: bbapp: blob: 'wasm-unsafe-eval' 'nonce-{{NONCE}}'; connect-src bbscene: bbapp: blob:; media-src blob:; worker-src blob:; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Local webcam compositor</title>
  <style nonce="{{NONCE}}">
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #090a0c; }
    body { font-family: system-ui, sans-serif; color: #e7e8ea; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #scene-canvas { z-index: 0; pointer-events: none; }
    #live-output { z-index: 2; }
    #camera-source { display: none; }
    .badge { position: absolute; z-index: 4; top: 14px; padding: 7px 11px; border: 1px solid #292b31; border-radius: 8px; background: rgba(12,13,15,.82); font: 600 11px ui-monospace, monospace; }
    #camera-state { left: 14px; }
    #standard-label { right: 14px; color: #e0a34a; }
    #original-label { left: 14px; color: #d9dbe0; display: none; }
    body[data-mode="compare"] #camera-state { top: auto; bottom: 14px; }
    body[data-mode="compare"] #original-label { display: block; }
    .diagnostics { position: absolute; z-index: 4; right: 14px; bottom: 14px; max-width: calc(100% - 28px); padding: 6px 9px; border-radius: 7px; background: rgba(12,13,15,.72); color: rgba(255,255,255,.62); font: 10px ui-monospace, monospace; }
    #mask-preview { position: absolute; z-index: 4; left: 14px; bottom: 14px; width: 128px; height: 72px; border: 1px solid #292b31; border-radius: 7px; background: #08090b; opacity: .82; }
    .loading { position: absolute; z-index: 5; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 45%, #302e29, #111216 60%); }
    .loading[hidden] { display: none; }
    .loading span { padding: 10px 14px; border-radius: 9px; background: rgba(8,9,11,.72); color: #e0a34a; font-size: 13px; }
    body[data-camera="error"] #camera-state, body[data-camera="lost"] #camera-state { color: #e58076; }
  </style>
</head>
<body data-mode="show" data-camera="idle">
  <canvas id="scene-canvas" aria-label="Rendered reconstructed room"></canvas>
  <video id="camera-source" playsinline muted></video>
  <canvas id="live-output" aria-label="Local standard-matting composite"></canvas>
  <div id="subject-guide" hidden></div>
  <div id="safe-warning" hidden></div>
  <div id="camera-state" class="badge" role="status">Camera off</div>
  <div id="original-label" class="badge">ORIGINAL WEBCAM</div>
  <div id="standard-label" class="badge">STANDARD COMPOSITE · NOT YET HARMONISED</div>
  <canvas id="mask-preview" aria-label="Local person mask diagnostics"></canvas>
  <div id="diagnostics" class="diagnostics" aria-label="Local pipeline diagnostics">Waiting for camera</div>
  <div id="loading" class="loading"><span>Preparing room renderer…</span></div>
  <script nonce="{{NONCE}}" src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script nonce="{{NONCE}}" src="bbapp://renderer/live-renderer.js"></script>
  <script nonce="{{NONCE}}">
    new QWebChannel(qt.webChannelTransport, function (channel) {
      BetterBackgroundsLive.startLive(channel.objects.rendererBridge);
    });
  </script>
</body>
</html>
