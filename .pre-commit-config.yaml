repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^src/better_backgrounds/desktop/assets/(?:renderer\.js|live-renderer\.js|matting/wasm/)
      - id: end-of-file-fixer
        exclude: ^src/better_backgrounds/desktop/assets/matting/wasm/
      - id: check-added-large-files
        exclude: ^src/better_backgrounds/desktop/assets/(?:renderer\.js|live-renderer\.js|matting/wasm/)
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false
        types_or: [python, pyi]
