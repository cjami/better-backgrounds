name: CI

on:
  push:
  pull_request:

jobs:
  desktop-package:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --all-groups --locked
      - run: npm ci --no-audit --no-fund
      - name: Source smoke test
        run: uv run python -m better_backgrounds.desktop --build-smoke-test
      - name: Prepare the deployment spec for this runner
        run: uv run python packaging/configure_spec.py
      - run: uv run pyside6-deploy -c pysidedeploy.spec --force
      - name: Show packaging output
        if: always()
        shell: bash
        run: |
          for dir in dist build src/better_backgrounds/desktop; do
            echo "--- $dir ---"
            [ -d "$dir" ] && find "$dir" -maxdepth 2 || echo "(missing)"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: better-backgrounds-${{ runner.os }}-${{ runner.arch }}
          path: dist/
