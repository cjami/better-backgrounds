name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            asset: BetterBackgrounds-Windows-x64
          - os: macos-15
            asset: BetterBackgrounds-macOS-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --all-groups --locked
      - run: npm ci --no-audit --no-fund

      # The spec ships the Windows .ico; macOS bundles need the .icns instead.
      # pyside6-deploy also needs an interpreter path valid on this runner.
      - name: Prepare the deployment spec for this runner
        shell: bash
        run: uv run python packaging/configure_spec.py

      - run: uv run pyside6-deploy -c pysidedeploy.spec --force

      - name: Show packaging output
        if: always()
        shell: bash
        run: |
          for dir in dist build src/better_backgrounds/desktop; do
            echo "--- $dir ---"
            [ -d "$dir" ] && find "$dir" -maxdepth 2 || echo "(missing)"
          done

      - name: Stage the release
        shell: bash
        run: |
          uv run python packaging/stage_release.py
          find build/release -maxdepth 2

      # ditto preserves the symlinks and permission bits inside a macOS bundle
      # that a plain zip would flatten, leaving the app unlaunchable.
      - name: Archive macOS bundle
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc build/release "${{ matrix.asset }}.zip"

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build\release\* -DestinationPath "${{ matrix.asset }}.zip"

      - name: Verify the archive is not empty
        shell: bash
        run: |
          uv run python packaging/verify_archive.py "${{ matrix.asset }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip

  publish:
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Better Backgrounds $TAG" \
            --notes-file packaging/RELEASE_NOTES.md \
            --verify-tag 2>/dev/null \
            || gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file packaging/RELEASE_NOTES.md
          gh release upload "$TAG" artifacts/*.zip --repo "$GITHUB_REPOSITORY" --clobber
